services:
  rt-refresh:
    image: ghcr.io/zhizhishu/rt-refresh:latest
    container_name: rt-refresh
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      AUTH_USER: ${AUTH_USER:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      CAPTURE_REDACT: ${CAPTURE_REDACT:-true}
    ports:
      - "8787:8787"
